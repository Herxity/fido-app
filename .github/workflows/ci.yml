name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.30"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.11"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest --cov=app --cov-report=term-missing
      - run: uv run pip-audit
      - run: uv run python scripts/export_openapi.py
      - run: git diff --exit-code -- openapi.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run api:generate
      - run: git diff --exit-code -- src/api/openapi.d.ts
      - run: npm run build
      - run: npm audit --omit=dev
      - run: npx playwright install --with-deps chromium
      - run: VITE_USE_DEMO_DATA=true npm run test:e2e

  infrastructure:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run synth
      - run: npm audit --omit=dev

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: fido-backend:ci
      - uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: fido-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
